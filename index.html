<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academic Homepage</title>
  <link rel="preload" as="image" href="./assets/avatar.jpg" />
  <link rel="preload" as="image" href="./assets/nav.jpg" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="#">
        <img id="nav-avatar" class="brand-avatar" src="./assets/avatar.jpg" alt="Avatar" width="32" height="32" loading="eager" decoding="async" />
        <span id="nav-name">Your Name</span>
      </a>

      <nav class="site-nav" id="site-nav">
        <a id="nav-about" href="#about">About</a>
        <a id="nav-news" href="#news">News</a>
        <a id="nav-projects" href="#projects">Projects</a>
        <a id="nav-education" href="#education">Education</a>
        <a id="nav-experience" href="#experience">Experience</a>
        <a id="nav-awards" href="#awards">Awards</a>
      </nav>

      <button
        class="nav-toggle"
        id="nav-toggle"
        aria-label="Toggle navigation"
        aria-expanded="false"
        aria-controls="nav-overflow-menu"
        type="button"
      >
        ☰
      </button>

      <button
        class="lang-toggle"
        id="lang-toggle"
        type="button"
        aria-label="Switch language"
        data-lang="en"
      >
        <span class="lang-toggle-option lang-toggle-en">EN</span>
        <span class="lang-toggle-option lang-toggle-zh">中文</span>
      </button>

      <nav class="nav-overflow-menu" id="nav-overflow-menu" aria-label="More navigation"></nav>
    </div>
  </header>

  <div class="page">
    <aside class="sidebar">
      <img id="avatar" class="avatar" src="./assets/avatar.jpg" alt="Avatar" width="256" height="256" loading="eager" fetchpriority="high" decoding="async" />

      <h1 class="name" id="name-cn">Your Name</h1>
      <p class="college" id="college">Your School</p>
      <p class="tagline" id="tagline"></p>

      <div class="social-icons" id="social-links"></div>
    </aside>

    <main class="main">
      <section class="section" id="about">
        <h2 id="heading-about">About Me</h2>
        <div id="about-content"></div>
      </section>

      <section class="section" id="news">
        <h2 id="heading-news">News</h2>
        <ul class="news-list" id="news-list"></ul>
      </section>

      <section class="section" id="projects">
        <h2 id="heading-projects">Selected Projects</h2>
        <div id="projects-list"></div>
      </section>

      <section class="section" id="education">
        <h2 id="heading-education">Education</h2>
        <div id="education-list"></div>
      </section>

      <section class="section" id="experience">
        <h2 id="heading-experience">Experience</h2>
        <div id="experience-list"></div>
      </section>

      <section class="section" id="awards">
        <h2 id="heading-awards">Honors & Awards</h2>
        <ul class="awards-list" id="awards-list"></ul>
      </section>
    </main>
  </div>

  <div class="image-lightbox" id="image-lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Award image preview">
    <button class="lightbox-close" id="lightbox-close" type="button" aria-label="Close image preview">✕</button>
    <img class="lightbox-image" id="lightbox-image" src="" alt="" decoding="async" />
  </div>

  <script src="./content-en.js"></script>
  <script src="./content-zh.js"></script>

  <script src="./content.js"></script>
</body>
</html>
